apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyber-platform-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: ec2-34-254-15-162.eu-west-1.compute.amazonaws.com
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: manager-api-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: manager-front-service
                port:
                  number: 3000
